<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth SMKN 1 Subang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="flash-effect"></div>

<div class="lang-switch">
    <button onclick="setBahasa('id')">ID</button>
    <button onclick="setBahasa('en')">EN</button>
</div>

<!-- HALAMAN 1: WELCOME -->
<div id="page-1" class="page-container active-page">
    <div class="landing-content">
        <h1 class="data-lang" data-key="judulWelcome">WELCOME TO PHOTOBOOTH X PPLG 1</h1>
        <p class="data-lang" data-key="subWelcome">CEKREK X PPLG 1</p>
        <button class="btn-main" onclick="pindahHalaman(2)">START CEKREK</button>
    </div>
</div>

<!-- HALAMAN 2: PILIH FRAME -->
<div id="page-2" class="page-container">
    <div class="frame-selection-screen">
        <h2>PILIH FRAME TERKEREN</h2>
        <div class="frame-grid-layout">
            <div class="frame-item" onclick="pilihFrameDanLanjut('spiderman 2.png')">
                <img src="spiderman 2.png" alt="Spiderman">
                <p>Spiderman Edition</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('bintang.png')">
                <img src="bintang.png" alt="Bintang">
                <p>Star Vintage</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('vintage.png')">
                <img src="vintage.png" alt="Vintage">
                <p>Retro Aesthetic</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('spongebob2.png')">
                <img src="spongebob2.png" alt="Spongebob">
                <p>Bikini Bottom</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('spiderman3.png')">
                <img src="spiderman3.png" alt="Spiderman 3">
                <p>Spiderman 3</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('komik baground.png')">
                <img src="komik baground.png" alt="Komik">
                <p>Aesthethic</p>
            </div>
            <div class="frame-item" onclick="pilihFrameDanLanjut('frame lucu.png')">
                <img src="frame lucu.png" alt="Frame Lucu">
                <p>Frame Lucu</p>
            </div>
        </div>
        <button class="btn-back" onclick="pindahHalaman(1)">⬅️ Kembali</button>
    </div>
</div>

<!-- HALAMAN 3: KAMERA -->
<div id="page-3" class="page-container">
    <div class="photo-booth-workspace">
        <div class="camera-zone">
            <div class="live-monitor">
                <video id="video" autoplay playsinline></video>
                <div class="live-frame-overlay">
                    <img id="frame-preview" src="" alt="Frame Overlay">
                </div>
                <div id="countdown-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:10; border-radius:12px;">
                    <span id="countdown-text" style="font-size:100px; color:white; font-weight:bold; text-shadow: 0 0 20px #fff;"></span>
                </div>
            </div>
            <button id="startCaptureBtn" class="btn-main" onclick="startCountdown()" style="margin-top:15px;">
                📷 START CAPTURE
            </button>
            <button class="btn-back" onclick="pindahHalaman(2)" style="margin-top:10px;">
                ⬅️ Ganti Frame
            </button>
        </div>
    </div>
</div>

<!-- HALAMAN 4: HASIL STRIP -->
<div id="page-4" class="page-container">
    <div class="photo-booth-workspace">

        <div class="result-zone">
            <h3 class="data-lang" data-key="judulHasil">Hasil Strip Polaroid</h3>
            <div id="photos"></div>
        </div>

        <div class="options-zone">
            <h4>Ganti Frame:</h4>
            <div class="frame-selection-inside">
                <img src="spiderman3.png"     onclick="gantiFrameInstan('spiderman3.png')"     title="Spiderman 3">
                <img src="spiderman 2.png"    onclick="gantiFrameInstan('spiderman 2.png')"    title="Spiderman 2">
                <img src="frame lucu.png"     onclick="gantiFrameInstan('frame lucu.png')"     title="Frame Lucu">
                <img src="spongebob2.png"     onclick="gantiFrameInstan('spongebob2.png')"     title="Bikini Bottom">
                <img src="vintage.png"        onclick="gantiFrameInstan('vintage.png')"        title="Vintage">
                <img src="komik baground.png" onclick="gantiFrameInstan('komik baground.png')" title="Komik">
                <img src="bintang.png"        onclick="gantiFrameInstan('bintang.png')"        title="Bintang">
            </div>

            <button id="qrBtn" onclick="bikinQrCodeInstan()" style="background:#28a745; color:#fff; margin-top:20px;">
                📱 GENERATE QR CODE
            </button>

            <div id="qrcode-container" style="display:none; background:#fff; padding:15px; margin:15px auto; width:180px; border-radius:8px; text-align:center;">
                <div id="qrcode"></div>
                <p style="color:#333; font-weight:bold; margin-top:10px; font-size:13px;">Scan Buat Download!</p>
            </div>

            <button class="btn-back" onclick="pindahHalaman(1)" style="margin-top:15px; background:#555;">
                🔄 KEMBALI KE AWAL
            </button>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="bahasa.js"></script>
<script src="pan.js"></script>
</body>
</html>
